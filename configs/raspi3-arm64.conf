# Raspberry Pi 3 B+ hardware reference.
TARGET_ARCH=arm64
TARGET_PLATFORM=raspi3
SMP_CPUS=4
ENABLE_NET=yes
ENABLE_GPU=no
ENABLE_HDMI=yes
ENABLE_WIFI=yes
HDMI_WIDTH=1280
HDMI_HEIGHT=720
ENABLE_ILI9341=yes
ENABLE_USB=yes
BUILD_NEWLIB=no
BUILD_TCC=no
BUILD_BSD=no
BUILD_NCURSES=no
BUILD_NANO=no
DEVICE_TREE=bcm2710-rpi-3-b-plus.dtb
DTOVERLAY=disable-bt
